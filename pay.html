        body {

          border: px solid black;

          box-shadow:

          font-size: 18px;
          color: #1b263b;
          text-decoration: none;
          text-align: center;
        }

        .hrline {
          animation: hrline;
          animation-name: hrline;
          animation-duration: 0.7s;
          animation-timing-function: ease;
          animation-fill-mode: forwards;
          animation-direction: reverse;
        }

        @keyframes hrline {
          0% {
            width: 20%;
          }
          100% {
            width: 95%"
          }
        }
        @keyframes icon {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        70%{
            width: 60px;
            opacity: 0.1;
        }
        100% {
          opacity: 0;
          transform: scale(1.5);
          width: 0px;
        }
      }
      @keyframes headlan {
      0%{
      height: 140px;
      }
      100%{
      height: 70px;
      }
      }
      .icon {
        animation: icon;
        animation-name: icon;
        animation-duration: 0.7s;
        animation-timing-function: ease-out;
        animation-fill-mode: forwards;
        animation-delay: 1s;
      }
      .headlan {
        animation: headlan;
        animation-name: headlan;
        animation-duration: 0.5s;
        animation-timing-function: ease;
        animation-fill-mode: both;
        animation-delay: 1.5s;
      }
      .box {
        display: flex;
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        width: 52%;
        align-items: center;
        justify-content: center;
        margin: auto;
      }
      .photo {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        width: 100%;
        max-width: 100%;
        height: auto;
      }

      .container::-webkit-scrollbar {
        width: 0px;
      }
