      .hrline {
        animation: hrline;
        animation-name: hrline;
        animation-duration: 0.7s;
        animation-timing-function: ease;
        animation-fill-mode: forwards;
      }

      @keyframes hrline {
        0% {
          width: 0%;
        }
        100% {
          width: 95%"
        }
      }
    </style>
